<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-5 text-center" style="max-width:500px;">

        <h2>Welcome!</h2>

        <p class="text-muted">
            You have successfully signed in with Microsoft Entra ID.
        </p>

        <p><strong>Name:</strong> {{ user.name }}</p>
        <p><strong>Email:</strong> {{ user.preferred_username }}</p>

        <a href="/logout" class="btn btn-danger mt-3">
            Logout
        </a>

    </div>

</div>

</body>
</html>
